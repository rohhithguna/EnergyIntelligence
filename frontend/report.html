<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Flow Intelligence - Report</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="topbar">
      <h1>Report</h1>
      <nav>
        <a href="/index.html">Upload</a>
        <a href="/dashboard.html">Dashboard</a>
        <a class="active" href="/report.html">Report</a>
        <a href="/ai_insights.html">AI Insights</a>
        <a href="/comparison.html">Comparison</a>
        <a href="/index.html" class="btn-add-dataset">+ Add Dataset</a>
      </nav>
    </header>

    <div id="empty-state" class="empty-state" style="display:none;">
      <p>No data loaded. Upload a dataset to begin.</p>
    </div>

    <div id="report-content" style="display:none;">
      <section class="section">
        <h2>Status</h2>
        <div id="status-bar" class="status-text"></div>
      </section>

      <section class="section">
        <h2>Signal Chart</h2>
        <svg id="graph" viewBox="0 0 900 260" preserveAspectRatio="none"></svg>
        <div class="legend">
          <span><b>▲</b> Spike</span>
          <span><b>▼</b> Drop</span>
          <span><b>●</b> Anomaly</span>
        </div>
      </section>

      <section class="section">
        <h2>Insights</h2>
        <div id="insights" class="findings-list"></div>
      </section>

      <section class="section">
        <h2>Recommendations</h2>
        <ul id="recommendations" class="findings-list"></ul>
      </section>

      <section class="section">
        <h2>Events</h2>
        <ul id="event-list" class="event-list"></ul>
        <div id="event-detail" class="event-detail">Select an event to view details.</div>
      </section>

      <section class="section">
        <h2>Export</h2>
        <div class="button-group">
          <button id="export-txt" class="btn-secondary">Download Text</button>
          <button id="export-structured" class="btn-secondary">Download JSON</button>
        </div>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
