<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Flow Intelligence - Comparison</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="topbar">
      <h1>Comparison</h1>
      <nav>
        <a href="/index.html">Upload</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/report.html">Report</a>
        <a href="/ai_insights.html">AI Insights</a>
        <a class="active" href="/comparison.html">Comparison</a>
        <a href="/index.html" class="btn-add-dataset">+ Add Dataset</a>
      </nav>
    </header>

    <div id="empty-state" class="empty-state" style="display:none;">
      <p>No data loaded. Upload a dataset to begin.</p>
    </div>

    <div id="comparison-content" style="display:none;">
      <section class="section">
        <h2>Available Reports</h2>
        <div id="warning-container"></div>
        <div id="reports-list" class="reports-list"></div>
      </section>

      <section class="section" id="comparison-view-section" style="display:none;">
        <h2>Side-by-Side Comparison</h2>
        <div id="comparison-columns" class="comparison-columns"></div>
      </section>

      <section class="section" id="comparison-table-section" style="display:none;">
        <h2>Metrics</h2>
        <div id="comparison-table-container" class="table-wrapper"></div>
      </section>

      <section class="section" id="comparison-insight-section" style="display:none;">
        <h2>Insight</h2>
        <p id="comparison-insight" class="findings-text"></p>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
